default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", "5435") %>
  username: <%= ENV.fetch("DB_USERNAME", "trak") %>
  password: <%= ENV.fetch("DB_PASSWORD", "trak") %>

development:
  <<: *default
  database: trak_development

test:
  <<: *default
  database: trak_test

production:
  <<: *default
  database: trak_production
  username: <%= ENV.fetch("DB_USERNAME", "trak") %>
  password: <%= ENV["DB_PASSWORD"] %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  port: <%= ENV.fetch("DB_PORT", "5432") %>
